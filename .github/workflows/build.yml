name: Build APK from Flutter/ZIP

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL website (untuk webview)'
        required: false
        default: ''
      app_name:
        description: 'Nama Aplikasi'
        required: true
      package_name:
        description: 'Package Name (com.example.app)'
        required: true
      user_id:
        description: 'User ID Telegram untuk kirim APK'
        required: true
      zip_url:
        description: 'URL ZIP file (dari Telegram)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
      
      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk
          echo "y" | $HOME/android-sdk/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-33" "build-tools;33.0.0"
      
      - name: Download project
        run: |
          mkdir -p ${{ github.workspace }}/project
          cd ${{ github.workspace }}/project
          
          if [ -n "${{ github.event.inputs.zip_url }}" ]; then
            echo "📦 Downloading project from ZIP URL..."
            wget -O project.zip "${{ github.event.inputs.zip_url }}"
            unzip -o project.zip
          else
            echo "🌐 Creating webview project from URL: ${{ github.event.inputs.url }}"
            mkdir -p lib
            
            echo "name: ${{ github.event.inputs.app_name }}" > pubspec.yaml
            echo "description: A webview application" >> pubspec.yaml
            echo "version: 1.0.0" >> pubspec.yaml
            echo "environment:" >> pubspec.yaml
            echo "  sdk: '>=3.0.0 <4.0.0'" >> pubspec.yaml
            echo "dependencies:" >> pubspec.yaml
            echo "  flutter:" >> pubspec.yaml
            echo "    sdk: flutter" >> pubspec.yaml
            echo "  webview_flutter: ^4.4.0" >> pubspec.yaml
            echo "flutter:" >> pubspec.yaml
            echo "  uses-material-design: true" >> pubspec.yaml
            
            echo "import 'package:flutter/material.dart';" > lib/main.dart
            echo "import 'package:webview_flutter/webview_flutter.dart';" >> lib/main.dart
            echo "" >> lib/main.dart
            echo "void main() => runApp(const WebApp());" >> lib/main.dart
            echo "" >> lib/main.dart
            echo "class WebApp extends StatelessWidget {" >> lib/main.dart
            echo "  const WebApp({super.key});" >> lib/main.dart
            echo "" >> lib/main.dart
            echo "  @override" >> lib/main.dart
            echo "  Widget build(BuildContext context) {" >> lib/main.dart
            echo "    return MaterialApp(" >> lib/main.dart
            echo "      title: '${{ github.event.inputs.app_name }}'," >> lib/main.dart
            echo "      theme: ThemeData.dark()," >> lib/main.dart
            echo "      home: Scaffold(" >> lib/main.dart
            echo "        appBar: AppBar(" >> lib/main.dart
            echo "          title: Text('${{ github.event.inputs.app_name }}')," >> lib/main.dart
            echo "          backgroundColor: Colors.blue," >> lib/main.dart
            echo "        )," >> lib/main.dart
            echo "        body: WebView(" >> lib/main.dart
            echo "          initialUrl: '${{ github.event.inputs.url }}'," >> lib/main.dart
            echo "          javascriptMode: JavascriptMode.unrestricted," >> lib/main.dart
            echo "        )," >> lib/main.dart
            echo "      )," >> lib/main.dart
            echo "    );" >> lib/main.dart
            echo "  }" >> lib/main.dart
            echo "}" >> lib/main.dart
          fi
          
          ls -la
      
      - name: Detect project type
        id: detect
        run: |
          cd ${{ github.workspace }}/project
          if [ -f "pubspec.yaml" ]; then
            echo "type=flutter" >> $GITHUB_OUTPUT
            echo "📱 Flutter project detected"
          elif [ -f "build.gradle" ] || [ -f "app/build.gradle" ]; then
            echo "type=android" >> $GITHUB_OUTPUT
            echo "📱 Android project detected"
          else
            echo "type=webview" >> $GITHUB_OUTPUT
            echo "🌐 Webview project (fallback)"
          fi
      
      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        run: |
          cd ${{ github.workspace }}/project
          flutter pub get
          flutter build apk --release
          mkdir -p ${{ github.workspace }}/output
          cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/output/${{ github.event.inputs.app_name }}.apk
      
      - name: Build Android APK
        if: steps.detect.outputs.type == 'android'
        run: |
          cd ${{ github.workspace }}/project
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "No gradlew found, skipping..."
          fi
          mkdir -p ${{ github.workspace }}/output
          find . -name "*.apk" -exec cp {} ${{ github.workspace }}/output/${{ github.event.inputs.app_name }}.apk \;
      
      - name: Build WebView APK
        if: steps.detect.outputs.type == 'webview'
        run: |
          cd ${{ github.workspace }}/project
          flutter pub get
          flutter build apk --release
          mkdir -p ${{ github.workspace }}/output
          cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/output/${{ github.event.inputs.app_name }}.apk
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-${{ github.event.inputs.package_name }}
          path: ${{ github.workspace }}/output/*.apk
      
      - name: Upload APK to Cloud Storage
        id: upload
        if: always()
        run: |
          APK_PATH="${{ github.workspace }}/output/${{ github.event.inputs.app_name }}.apk"
          
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi
          
          # Dapatkan info file
          FILE_SIZE=$(du -h "$APK_PATH" | cut -f1)
          FILE_SIZE_BYTES=$(stat -c%s "$APK_PATH")
          FILE_DATE=$(date -r "$APK_PATH" "+%Y-%m-%d %H:%M:%S")
          FILE_MD5=$(md5sum "$APK_PATH" | cut -d' ' -f1)
          FILE_NAME=$(basename "$APK_PATH")
          
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "FILE_SIZE_BYTES=$FILE_SIZE_BYTES" >> $GITHUB_ENV
          echo "FILE_DATE=$FILE_DATE" >> $GITHUB_ENV
          echo "FILE_MD5=$FILE_MD5" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          
          # Upload ke temp.sh
          echo "📤 Uploading APK to temp.sh..."
          UPLOAD_RESPONSE=$(curl -s -F "file=@$APK_PATH" https://temp.sh/upload)
          
          # Extract download URL
          DOWNLOAD_URL=$(echo "$UPLOAD_RESPONSE" | grep -o 'https://temp.sh/[^"]*' | head -1)
          
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ Failed to upload to temp.sh"
            echo "Response: $UPLOAD_RESPONSE"
            exit 1
          fi
          
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "✅ Upload successful!"
          echo "📥 Download URL: $DOWNLOAD_URL"
      
      - name: Send Download Link to User
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "${{ env.DOWNLOAD_URL }}" ]; then
            echo "❌ No download URL found, skipping..."
            exit 1
          fi
          
          # Build message with echo
          MESSAGE="🎉 *Build APK Selesai!*%0A%0A"
          MESSAGE="${MESSAGE}📱 *Nama Aplikasi:* ${{ github.event.inputs.app_name }}%0A"
          MESSAGE="${MESSAGE}📦 *Package Name:* ${{ github.event.inputs.package_name }}%0A"
          MESSAGE="${MESSAGE}🔗 *URL:* ${{ github.event.inputs.url }}%0A%0A"
          MESSAGE="${MESSAGE}📄 *File Info:*%0A"
          MESSAGE="${MESSAGE}└── 📁 ${{ env.FILE_NAME }}%0A"
          MESSAGE="${MESSAGE}    ├── 📊 Size: ${{ env.FILE_SIZE }}%0A"
          MESSAGE="${MESSAGE}    ├── 📅 Date: ${{ env.FILE_DATE }}%0A"
          MESSAGE="${MESSAGE}    └── 🔑 MD5: ${{ env.FILE_MD5 }}%0A%0A"
          MESSAGE="${MESSAGE}⬇️ *Download APK:*%0A"
          MESSAGE="${MESSAGE}${{ env.DOWNLOAD_URL }}%0A%0A"
          MESSAGE="${MESSAGE}⏱️ *Build Time:* $(date "+%Y-%m-%d %H:%M:%S")%0A"
          MESSAGE="${MESSAGE}🔧 *Status:* ✅ Success"
          
          echo "📤 Sending download link to user: ${{ github.event.inputs.user_id }}"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${{ github.event.inputs.user_id }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
          
          echo ""
          echo "✅ Message sent!"
      
      - name: Notify build status
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            STATUS="✅ Build SUCCESS"
          else
            STATUS="❌ Build FAILED"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${{ github.event.inputs.user_id }}" \
            -d "text=${STATUS}%0A📱 Nama: ${{ github.event.inputs.app_name }}%0A📦 Package: ${{ github.event.inputs.package_name }}" \
            -d "parse_mode=Markdown"
